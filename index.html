<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f3f4f6;
            font-family: 'Sarabun', sans-serif;
        }
        .loader-container {
            text-align: center;
            color: #4b5563;
        }
        .spinner {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <h3>loading</h3>
    </div>

    <script>
        // 1. เอา URL ของ Google Apps Script (ที่ Deploy ล่าสุด) มาวางตรงนี้
        // หากมีการ Deploy ใหม่ ให้มาเปลี่ยนแค่บรรทัดนี้ใน GitHub
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwhPpBz6AZiVi9f1VbUcFhBHPY_fWkujn9QARhRbSl32hoK8etxlrZEosrL9oPVnuDb/exec";

        // 2. ดึง Parameter ทั้งหมดจาก URL ของ GitHub (เช่น ?page=addData)
        const urlParams = new URLSearchParams(window.location.search);
        const queryString = urlParams.toString();

        // 3. ประกอบร่าง URL ปลายทาง
        // ถ้ามี Parameter ต่อท้าย ก็ให้ส่งไปด้วย ถ้าไม่มีก็ไปหน้า Index ปกติ
        const targetUrl = queryString ? GAS_URL + "?" + queryString : GAS_URL;

        // 4. ทำการ Redirect ไปที่ App Script
        // ใช้ .replace() เพื่อที่เวลาผู้ใช้กดปุ่ม "ย้อนกลับ (Back)" ในเบราว์เซอร์ จะได้ไม่เด้งกลับมาหน้าโหลดนี้ซ้ำ
        window.location.replace(targetUrl);
    </script>

</body>
</html>
