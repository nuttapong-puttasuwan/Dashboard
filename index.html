<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f3f4f6;
            font-family: 'Sarabun', sans-serif;
        }
        .loader-container {
            text-align: center;
            color: #4b5563;
        }
        .spinner {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <h3>ระบบกำลังประมวลผล...</h3>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzyvK9h0lWBCQ7VWIyIyMUZ-pZSFE0AanmRzgCjC83L0FguXoenahn4yd6KGr-snh2F/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const queryString = urlParams.toString();
        const targetUrl = queryString ? GAS_URL + "?" + queryString : GAS_URL;
        window.location.replace(targetUrl);
    </script>

</body>
</html>
